<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Anmelden — AI Stock Photos</title>
  <meta name="description" content="Melden Sie sich bei AI Stock Photos an oder erstellen Sie ein neues Konto. Mit E-Mail, Passwort oder Google.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <section class="auth-page">
    <div class="auth-card">
      <div class="auth-header">
        <a href="index.html" class="logo" style="justify-content:center;margin-bottom:20px;">
          <div class="logo-icon">AI</div>
          <span>Stock Photos</span>
        </a>
        <h2 id="auth-title">Willkommen zurück</h2>
        <p id="auth-subtitle">Melden Sie sich an, um Ihre Downloads und Favoriten zu verwalten.</p>
      </div>

      <div class="auth-tabs">
        <button class="active" data-tab="login">Anmelden</button>
        <button data-tab="signup">Registrieren</button>
      </div>

      <!-- Login Panel -->
      <div class="form-panel active" id="panel-login">
        <form id="login-form">
          <div class="form-group">
            <label for="login-email">E-Mail-Adresse</label>
            <input type="email" id="login-email" placeholder="name@beispiel.de" required autocomplete="email">
          </div>
          <div class="form-group">
            <label for="login-password">Passwort</label>
            <input type="password" id="login-password" placeholder="Ihr Passwort" required autocomplete="current-password">
          </div>
          <div style="text-align:right;margin-bottom:16px;">
            <a href="#" id="forgot-link" style="font-size:0.85rem;color:var(--text-muted);">Passwort vergessen?</a>
          </div>
          <button type="submit" class="auth-submit">Anmelden</button>
        </form>
      </div>

      <!-- Signup Panel -->
      <div class="form-panel" id="panel-signup">
        <form id="signup-form">
          <div class="form-group">
            <label for="signup-name">Vollständiger Name</label>
            <input type="text" id="signup-name" placeholder="Max Mustermann" required autocomplete="name">
          </div>
          <div class="form-group">
            <label for="signup-email">E-Mail-Adresse</label>
            <input type="email" id="signup-email" placeholder="name@beispiel.de" required autocomplete="email">
          </div>
          <div class="form-group">
            <label for="signup-password">Passwort</label>
            <input type="password" id="signup-password" placeholder="Mindestens 8 Zeichen" required autocomplete="new-password" minlength="8">
          </div>
          <button type="submit" class="auth-submit">Konto erstellen</button>
        </form>
      </div>

      <!-- Forgot Password Panel -->
      <div class="form-panel" id="panel-forgot">
        <form id="reset-form">
          <div class="form-group">
            <label for="reset-email">E-Mail-Adresse</label>
            <input type="email" id="reset-email" placeholder="name@beispiel.de" required>
          </div>
          <p style="font-size:0.85rem;color:var(--text-muted);margin-bottom:20px;">Wir senden Ihnen einen Link zum Zurücksetzen Ihres Passworts.</p>
          <button type="submit" class="auth-submit">Link senden</button>
          <div class="auth-footer">
            <a href="#" id="back-to-login">← Zurück zum Login</a>
          </div>
        </form>
      </div>

      <div class="auth-divider">oder</div>

      <button class="google-btn" id="google-signin">
        <svg width="18" height="18" viewBox="0 0 24 24">
          <path fill="#EA4335" d="M12 5.04c1.55 0 2.94.54 4.03 1.59l3-3C17.47 1.34 14.9 0 12 0 7.39 0 3.37 2.67 1.43 6.54l3.49 2.71C6.04 6.18 8.8 5.04 12 5.04z"></path>
          <path fill="#4285F4" d="M23.5 12.27c0-.82-.07-1.61-.2-2.37H12v4.49h6.45c-.28 1.48-1.08 2.73-2.3 3.57l3.73 2.9C22.08 18.69 23.5 15.67 23.5 12.27z"></path>
          <path fill="#FBBC05" d="M5.26 9.15l-3.49-2.7C.57 8.24 0 10.06 0 12c0 1.94.57 3.76 1.77 5.55l3.49-2.71c-.34-1.01-.53-2.1-.53-3.24 0-1.14.19-2.23.53-3.25z"></path>
          <path fill="#34A853" d="M12 24c3.24 0 5.96-1.08 7.95-2.91l-3.73-2.9c-1.08.72-2.46 1.15-4.22 1.15-3.2 0-5.96-1.14-8.08-3.01L.57 17.05C2.51 20.93 6.53 24 12 24z"></path>
        </svg>
        Mit Google fortfahren
      </button>

      <div class="auth-footer">
        <span id="auth-footer-text">Noch kein Konto? <a href="#" id="switch-to-signup">Jetzt registrieren</a></span>
      </div>
    </div>
  </section>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <script src="js/auth.js"></script>
  <script src="js/app.js"></script>
  <script>
    (function() {
      var tabs = document.querySelectorAll('.auth-tabs button');
      var panels = document.querySelectorAll('.form-panel');
      var title = document.getElementById('auth-title');
      var subtitle = document.getElementById('auth-subtitle');
      var footer = document.getElementById('auth-footer-text');
      var forgotLink = document.getElementById('forgot-link');
      var backToLogin = document.getElementById('back-to-login');
      var switchToSignup = document.getElementById('switch-to-signup');
      var divider = document.querySelector('.auth-divider');
      var googleBtn = document.getElementById('google-signin');

      function showPanel(name) {
        panels.forEach(function(p) { p.classList.remove('active'); });
        tabs.forEach(function(t) { t.classList.remove('active'); });
        if (name === 'login') {
          document.getElementById('panel-login').classList.add('active');
          tabs[0].classList.add('active');
          title.textContent = 'Willkommen zurück';
          subtitle.textContent = 'Melden Sie sich an, um Ihre Downloads und Favoriten zu verwalten.';
          footer.innerHTML = 'Noch kein Konto? <a href="#" id="switch-to-signup">Jetzt registrieren</a>';
          document.getElementById('switch-to-signup').addEventListener('click', function(e) { e.preventDefault(); showPanel('signup'); });
          if (divider) divider.style.display = 'flex';
          if (googleBtn) googleBtn.style.display = 'flex';
        } else if (name === 'signup') {
          document.getElementById('panel-signup').classList.add('active');
          tabs[1].classList.add('active');
          title.textContent = 'Konto erstellen';
          subtitle.textContent = 'Registrieren Sie sich kostenlos und erhalten Sie 5 Gratis-Downloads.';
          footer.innerHTML = 'Bereits registriert? <a href="#" id="switch-to-login">Zum Login</a>';
          document.getElementById('switch-to-login').addEventListener('click', function(e) { e.preventDefault(); showPanel('login'); });
          if (divider) divider.style.display = 'flex';
          if (googleBtn) googleBtn.style.display = 'flex';
        } else if (name === 'forgot') {
          panels.forEach(function(p) { p.classList.remove('active'); });
          tabs.forEach(function(t) { t.classList.remove('active'); });
          document.getElementById('panel-forgot').classList.add('active');
          title.textContent = 'Passwort vergessen';
          subtitle.textContent = 'Kein Problem — wir helfen Ihnen, wieder reinzukommen.';
          footer.innerHTML = '';
          if (divider) divider.style.display = 'none';
          if (googleBtn) googleBtn.style.display = 'none';
        }
      }

      tabs.forEach(function(tab) {
        tab.addEventListener('click', function() { showPanel(tab.dataset.tab); });
      });

      if (forgotLink) {
        forgotLink.addEventListener('click', function(e) { e.preventDefault(); showPanel('forgot'); });
      }
      if (backToLogin) {
        backToLogin.addEventListener('click', function(e) { e.preventDefault(); showPanel('login'); });
      }
      if (switchToSignup) {
        switchToSignup.addEventListener('click', function(e) { e.preventDefault(); showPanel('signup'); });
      }

      // URL param
      var params = new URLSearchParams(window.location.search);
      if (params.get('mode') === 'signup') showPanel('signup');
    })();
  </script>
</body>
</html>
