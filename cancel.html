<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Zahlung abgebrochen — StockPhotoShop</title>
  <meta name="description" content="Die Zahlung wurde abgebrochen. Keine Sorge, dein Warenkorb ist noch da.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <style>
    .status-page {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
      background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
    }
    .status-icon {
      font-size: 5rem;
      margin-bottom: 1.5rem;
    }
    .status-page h1 {
      font-size: 2rem;
      font-weight: 800;
      margin-bottom: 0.75rem;
      color: #f8fafc;
    }
    .status-page p {
      color: var(--text-secondary);
      margin-bottom: 2rem;
      max-width: 400px;
      line-height: 1.6;
    }
    .status-actions {
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
      justify-content: center;
    }
    .hint {
      margin-top: 2rem;
      font-size: 0.875rem;
      color: var(--text-secondary);
      opacity: 0.7;
    }
  </style>
</head>
<body>

  <div class="status-page">
    <div class="status-icon">😕</div>
    <h1>Zahlung abgebrochen</h1>
    <p>Keine Sorge — es wurde nichts berechnet. Dein Warenkorb ist noch da und du kannst es jederzeit erneut versuchen.</p>

    <div class="status-actions">
      <a href="gallery.html" class="btn btn-primary btn-lg">Zurück zur Galerie</a>
      <button class="btn btn-secondary btn-lg" onclick="history.back()">Zurück zum Warenkorb</button>
    </div>

    <p class="hint">Fragen? Schreib uns unter <a href="mailto:support@stockphotoshop.de" style="color:var(--accent);">support@stockphotoshop.de</a></p>
  </div>
</body>
</html>
